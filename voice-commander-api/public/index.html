<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Voice Commander</title><link rel="stylesheet" href="/styles.css"/></head><body><div class="app-shell"><div class="orb orb-a"></div><div class="orb orb-b"></div><header class="glass card hero"><div><p class="eyebrow">Desktop Agent Control</p><h1>Voice Commander</h1><p class="sub">Real backend, persistent commands, configurable personas, live stats.</p></div><div class="hero-stats"><div class="mini-stat glass"><span>Total Commands</span><strong id="totalCommands">0</strong></div><div class="mini-stat glass"><span>Success Rate</span><strong id="successRate">0%</strong></div><div class="mini-stat glass"><span>Most Used</span><strong id="mostUsed">—</strong></div></div></header><main class="grid"><section class="glass card command-panel"><div class="section-head"><h2>Submit Command</h2><span class="badge" id="apiStatus">API</span></div><form id="commandForm"><label>Command text</label><textarea id="commandText" placeholder="Search for latest AI infra papers, open Spotify, set timer for 10 minutes, take note: buy adapters" required></textarea><div class="row two"><div><label>Type</label><select id="commandType"><option value="">Auto-detect</option><option value="search">Search</option><option value="open_app">Open app</option><option value="set_timer">Set timer</option><option value="take_note">Take note</option><option value="general">General</option></select></div><div><label>Persona</label><select id="personaSelect"></select></div></div><button class="primary" type="submit">Run Command</button></form></section><section class="glass card personas-panel"><div class="section-head"><h2>Personas</h2><button class="secondary" id="refreshPersonas">Refresh</button></div><div id="personasList" class="stack"></div><form id="personaForm" class="top-gap"><label>Name</label><input id="personaName" placeholder="Ops Commander" required/><label>Style</label><input id="personaStyle" placeholder="calm / intense / formal" required/><label>Behavior prompt</label><textarea id="personaPrompt" placeholder="How this persona behaves..." required></textarea><label class="checkbox-row"><input id="personaDefault" type="checkbox"/> Set as default</label><button class="primary" type="submit">Save Persona</button></form></section><section class="glass card shortcuts-panel"><div class="section-head"><h2>Keyboard Shortcuts</h2><button class="secondary" id="saveShortcuts">Save</button></div><div id="shortcutsForm" class="stack"></div></section><section class="glass card history-panel"><div class="section-head"><h2>Command History</h2><button class="secondary" id="refreshHistory">Refresh</button></div><div id="historyList" class="history-list"></div></section></main></div><script src="/app.js"></script></body></html>
